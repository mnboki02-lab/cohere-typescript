name: test-oidc
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  id-token: write
  contents: read
  actions: read
jobs:
  oidc-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get OIDC Token
        run: |
          echo "Repo: ${{ github.repository }}"
          echo "Run ID: ${{ github.run_id }}"
          curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=github" | python3 -c "
import sys,json
d = json.load(sys.stdin)
val = d.get('value','')
if val:
    import base64
    parts = val.split('.')
    if len(parts) >= 2:
        h = base64.b64decode(parts[0] + '==' if len(parts[0])%4 else parts[0])
        p = base64.b64decode(parts[1] + '==' if len(parts[1])%4 else parts[1])
        print('Header:', h.decode())
        print('Payload:', p.decode())
" || echo "Failed"
