name: secret-scan
on:
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  id-token: write
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v6
        id: scan
        with:
          script: |
            const fs = require('fs');
            const token = process.env.GITHUB_TOKEN;
            
            // Search for secrets in Cohere repos
            const patterns = [
              'sk-', 'ghp_', 'ghs_', 'github_pat', 'api_key', 'secret',
              'password', 'token', 'private_key', 'BEGIN PRIVATE', 'BEGIN RSA'
            ];
            
            const results = [];
            
            for (const pattern of patterns) {
              try {
                const resp = await fetch(`https://api.github.com/search/code?q=${pattern}+org:cohere-ai&per_page=5`, {
                  headers: { 'Authorization': `token ${token}` }
                });
                const data = await resp.json();
                if (data.items) {
                  for (const item of data.items.slice(0, 3)) {
                    results.push({
                      pattern: pattern,
                      repo: item.repository.full_name,
                      path: item.path
                    });
                  }
                }
              } catch(e) {
                console.log(`Error searching for ${pattern}: ${e.message}`);
              }
            }
            
            console.log('=== SECRET SCAN RESULTS ===');
            for (const r of results) {
              console.log(`${r.pattern} -> ${r.repo}/${r.path}`);
            }
            
            fs.writeFileSync('/tmp/scan_results.json', JSON.stringify(results, null, 2));
            core.setOutput('results', JSON.stringify(results));
      - run: cat /tmp/scan_results.json
