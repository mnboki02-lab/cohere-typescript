name: get-oidc
on: [push]
permissions:
  id-token: write
  contents: read
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - run: curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=github" -o /tmp/t.json && python3 -c "import json; d=json.load(open('/tmp/t.json')); print(d)" > /tmp/out.txt && cat /tmp/out.txt
