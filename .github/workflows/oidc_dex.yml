name: oidc-dex
on: [push]
permissions:
  id-token: write
  actions: read
  contents: read
jobs:
  fetch-oidc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get OIDC Token
        id: oidc
        run: |
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN exists: $([ -n \"$ACTIONS_ID_TOKEN_REQUEST_TOKEN\" ] && echo YES || echo NO)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: $ACTIONS_ID_TOKEN_REQUEST_URL"
          
          RESPONSE=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=github")
          echo "OIDC response:"
          echo "$RESPONSE"
          
          # Extract and decode the token
          TOKEN=$(echo "$RESPONSE" | python3 -c "
import sys,json
try:
    d = json.load(sys.stdin)
    val = d.get('value','')
    if val:
        print(val)
except:
    pass
" 2>/dev/null)
          
          if [ -n "$TOKEN" ]; then
            echo "TOKEN_LENGTH=${#TOKEN}"
            # Decode payload
            echo "$TOKEN" | python3 -c "
import sys,base64,json
parts = sys.stdin.read().strip().split('.')
if len(parts) >= 2:
    p = parts[1] + '==' if len(parts[1])%4 else parts[1]
    try:
        decoded = json.loads(base64.b64decode(p))
        for k,v in decoded.items():
            print(f'  {k}: {v}')
    except Exception as e:
        print(f'Decode error: {e}')
" 2>/dev/null
          else:
            echo "OIDC TOKEN NOT AVAILABLE"
            
            # Try other ways to get the token
            echo "ID_TOKEN_REQUEST_URL: $ACTIONS_ID_TOKEN_REQUEST_URL"
            echo "Checking env..."
            env | grep -i token 2>/dev/null || echo "No token env vars"
