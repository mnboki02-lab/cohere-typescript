name: Federated Token Exchange
on: workflow_dispatch

permissions:
  id-token: write
  contents: read

jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC token and exchange for North JWT
        uses: actions/github-script@v6
        with:
          script: |
            // Step 1: Get GitHub OIDC token
            const token = await core.getIDToken('north');
            core.info(`OIDC Token obtained: ${token.substring(0, 50)}...`);
            core.setSecret(token);
            
            // Step 2: Exchange for North JWT on demo.north.cohere.com
            const response = await fetch('https://demo.north.cohere.com/api/v1/token/exchange', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                connector_id: 'githubTokenExchange',
                subject_token: token,
                subject_token_type: 'urn:ietf:params:oauth:token-type:id_token',
              }),
            });
            
            const data = await response.json();
            core.info(`Response status: ${response.status}`);
            core.info(`Response: ${JSON.stringify(data, null, 2)}`);
            
            if (data.access_token) {
              core.info(`NORTH JWT OBTAINED: ${data.access_token.substring(0, 50)}...`);
              core.setSecret(data.access_token);
              
              // Step 3: Test the JWT against North API
              const meResponse = await fetch('https://demo.north.cohere.com/api/v1/agents', {
                headers: {
                  'Authorization': `Bearer ${data.access_token}`,
                },
              });
              core.info(`Me response status: ${meResponse.status}`);
              const meText = await meResponse.text();
              core.info(`Me response: ${meText.substring(0, 200)}`);
            }
