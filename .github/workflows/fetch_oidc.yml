name: fetch-oidc
on: [push]
permissions:
  id-token: write
  contents: read
jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch token
        run: |
          curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=github" > /tmp/oidc.json
          echo "DONE fetching"
      - name: Show raw response
        run: |
          cat /tmp/oidc.json
      - name: Extract and decode
        run: |
          python3 << 'PYEOF'
import json,base64,sys
with open('/tmp/oidc.json') as f:
    d = json.load(f)
t = d.get('value','')
if t:
    print('TOKEN_FOUND')
    print('LENGTH=' + str(len(t)))
    parts = t.split('.')
    if len(parts) >= 2:
        p = parts[1] + '==' if len(parts[1]) % 4 else parts[1]
        try:
            decoded = json.loads(base64.b64decode(p))
            for k in ('sub','aud','iss','job_workflow_ref','repository','repository_owner','actor','sha','ref'):
                if k in decoded:
                    print(k + '=' + str(decoded[k]))
            print('FULL=' + json.dumps(decoded))
        except Exception as e:
            print('DECODE_ERROR=' + str(e))
    else:
        print('INVALID_TOKEN: not a 3-segment JWT')
else:
    print('NO_TOKEN')
    print('RESP=' + json.dumps(d))
PYEOF
